name: Build and Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.ver.outputs.version }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
      - id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
      - id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          # Find the commit the existing tag points to (empty if no tag)
          DEREF=$(git ls-remote origin "refs/tags/v${VERSION}^{}" | cut -f1)
          DIRECT=$(git ls-remote origin "refs/tags/v${VERSION}" | cut -f1)
          TAG_COMMIT="${DEREF:-$DIRECT}"
          if [ -z "$TAG_COMMIT" ] || [ "$TAG_COMMIT" != "${{ github.sha }}" ]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi

  build-mac:
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build macOS arm64 app bundle
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CSC_LINK: ''
          APPLE_ID: ''
          APPLE_APP_SPECIFIC_PASSWORD: ''
        run: npx vite build && npx electron-builder --mac dir --arm64 --publish never
      - name: Ad-hoc sign app bundle
        run: |
          APP=$(find release/mac-arm64 -maxdepth 1 -name "*.app" | head -1)
          echo "Signing: $APP"
          codesign --deep --sign - --force "$APP"
      - name: Package signed app into DMG
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CSC_LINK: ''
        run: |
          APP=$(find release/mac-arm64 -maxdepth 1 -name "*.app" | head -1)
          npx electron-builder --mac dmg --arm64 --prepackaged "$APP" --publish never
      - name: List build output
        run: ls -la release/ || echo "No release/ directory found"
      - uses: actions/upload-artifact@v4
        with:
          name: mac-installers
          path: release/*.dmg
          if-no-files-found: error

  build-win:
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build Windows x64 installer
        env:
          WIN_CSC_LINK: ''
        shell: bash
        run: npx vite build && npx electron-builder --win nsis --x64 --publish never
      - name: List build output
        shell: bash
        run: ls -la release/ || echo "No release/ directory found"
      - uses: actions/upload-artifact@v4
        with:
          name: win-installers
          path: release/*.exe
          if-no-files-found: error

  release:
    needs: [check, build-mac, build-win]
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: installers
          merge-multiple: true
      - name: List installer files
        run: ls -la installers/
      - name: Replace existing release if present
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.check.outputs.version }}
        run: |
          gh release delete "v${VERSION}" --yes --cleanup-tag 2>/dev/null || true
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.check.outputs.version }}
        run: |
          gh release create "v${VERSION}" \
            --title "xPPM neo-Seoul v${VERSION}" \
            --generate-notes \
            --target main \
            installers/*
