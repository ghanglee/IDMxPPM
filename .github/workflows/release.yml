name: Build and Release

on:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.ver.outputs.version }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
      - id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
      - id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${{ steps.ver.outputs.version }}" &>/dev/null 2>&1; then
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

  build-mac:
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build macOS DMG
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx vite build && npx electron-builder --mac
      - uses: actions/upload-artifact@v4
        with:
          name: mac-installers
          path: release/*.dmg
          if-no-files-found: error

  build-win:
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build Windows installer
        shell: bash
        run: npx vite build && npx electron-builder --win
      - uses: actions/upload-artifact@v4
        with:
          name: win-installers
          path: release/*.exe
          if-no-files-found: error

  release:
    needs: [check, build-mac, build-win]
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: installers
          merge-multiple: true
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.check.outputs.version }}
        run: |
          gh release create "v${VERSION}" \
            --title "xPPM neo-Seoul v${VERSION}" \
            --generate-notes \
            --target main \
            installers/*
